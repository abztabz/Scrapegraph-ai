name: Deploy caregiver site to GitHub Pages

on:
  push:
    branches:
      - claude/caregiver-site-structure-0hws8w
    paths:
      - "caregiver-site/**"
      - ".github/workflows/deploy-caregiver-site.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        # enablement: true turns Pages on automatically if it isn't already
        uses: actions/configure-pages@v5
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: caregiver-site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
